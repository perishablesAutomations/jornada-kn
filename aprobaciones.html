<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprobaciones · KN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff; --surface: #ffffff; --surface2: #f0f6ff;
    --border: rgba(0,51,105,0.12); --border2: rgba(0,51,105,0.22);
    --text: #001a38; --muted: #4a6080;
    --kn-navy: #003369; --kn-blue: #0099DA; --kn-green: #08C792;
    --danger: #dc2626; --danger-bg: #fee2e2; --danger-text: #7f1d1d;
    --warn-bg: #fef3c7; --warn-text: #92400e;
    --info-bg: #e0f4fd; --info-text: #003369;
    --r: 10px; --r-lg: 16px;
    --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 0 0 60px; }

  header { background: var(--kn-navy); border-bottom: 3px solid var(--kn-blue); padding: 14px 24px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; color: rgba(255,255,255,0.9); text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--kn-green); display: inline-block; }
  .manager-chip { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.12); border-radius: 999px; padding: 5px 14px 5px 6px; border: 1px solid rgba(255,255,255,0.2); }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--kn-green); color: var(--kn-navy); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; font-family: var(--mono); }
  .mgr-name { font-size: 13px; font-weight: 500; color: #fff; }

  main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 0; }
  .page-title { font-size: 22px; font-weight: 700; color: var(--kn-navy); margin-bottom: 4px; }
  .page-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; font-family: var(--mono); }

  .summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 28px; max-width: 480px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; border-top: 3px solid var(--kn-blue); }
  .stat:first-child { border-top-color: var(--kn-navy); }
  .stat:nth-child(2) { border-top-color: var(--warn-text); }
  .stat:nth-child(3) { border-top-color: var(--kn-green); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .stat-val { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--kn-navy); }

  /* DESKTOP TABLE */
  .empleado-block { margin-bottom: 20px; border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
  .empleado-header { background: var(--kn-navy); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .emp-info { display: flex; align-items: center; gap: 10px; }
  .emp-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--kn-green); color: var(--kn-navy); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }
  .emp-name { font-size: 14px; font-weight: 600; color: #fff; }
  .emp-email { font-size: 11px; color: rgba(255,255,255,0.6); font-family: var(--mono); }
  .emp-count { font-size: 12px; font-family: var(--mono); color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 999px; white-space: nowrap; }

  /* Desktop: tabla full width */
  .desktop-table { display: table; width: 100%; border-collapse: collapse; }
  .desktop-table th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 9px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); text-align: left; font-weight: 500; white-space: nowrap; }
  .desktop-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  .desktop-table tr:last-child td { border-bottom: none; }
  .desktop-table tr:hover td { background: #fafcff; }
  /* Proporciones de columnas desktop */
  .col-fecha   { width: 120px; }
  .col-horario { width: 130px; }
  .col-horas   { width: 70px; }
  .col-tipo    { width: 160px; }
  .col-obs     { min-width: 140px; }
  .col-extra   { width: 90px; }
  .col-accion  { width: 180px; white-space: nowrap; }

  /* Mobile: cards */
  .mobile-cards { display: none; }
  .reg-card { border-top: 1px solid var(--border); padding: 14px 16px; }
  .reg-card:last-child { border-bottom: none; }
  .reg-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .reg-card-fecha { font-weight: 700; font-size: 14px; color: var(--kn-navy); }
  .reg-card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; align-items: center; }
  .reg-card-horario { font-family: var(--mono); font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 4px; }
  .icon-label { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); }
  .icon-label svg { flex-shrink: 0; }
  .reg-card-obs { font-size: 12px; color: var(--muted); font-style: italic; background: var(--surface2); padding: 7px 10px; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 6px; }
  .reg-card-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .reg-card-comp { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; margin-left: auto; }
  .reg-card-comp input { accent-color: var(--kn-green); width: 15px; height: 15px; cursor: pointer; }

  .time-val { font-family: var(--mono); font-size: 13px; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 999px; font-family: var(--mono); }
  .badge.dominical { background: #f3e8ff; color: #6b21a8; }
  .badge.sabado { background: var(--info-bg); color: var(--info-text); }
  .badge.habil { background: var(--surface2); color: var(--muted); }
  .badge.extra { background: var(--warn-bg); color: var(--warn-text); }

  .actions-cell { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .btn-decision { display: inline-flex; align-items: center; gap: 4px; padding: 6px 11px; border-radius: 8px; border: none; font-family: var(--sans); font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; letter-spacing: 0.02em; }
  .btn-decision .material-icons-round { font-size: 16px; }
  .btn-extra    { background: #dbeafe; color: #1d4ed8; border: 1.5px solid #93c5fd; }
  .btn-extra:hover    { background: #1d4ed8; color: #fff; }
  .btn-recargo  { background: #fef9c3; color: #854d0e; border: 1.5px solid #fde047; }
  .btn-recargo:hover  { background: #854d0e; color: #fff; }
  .btn-compensado { background: #e6faf4; color: #065f46; border: 1.5px solid #6ee7b7; }
  .btn-compensado:hover { background: #065f46; color: #fff; }
  .btn-rechazar { background: #fee2e2; color: #991b1b; border: 1.5px solid #fca5a5; }
  .btn-rechazar:hover { background: #991b1b; color: #fff; }
  .btn-decision:disabled { opacity: 0.35; cursor: not-allowed; }

  .status-chip { font-size: 12px; font-family: var(--mono); padding: 5px 12px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
  .status-chip.aprobado { background: #e6faf4; color: #035c41; }
  .status-chip.rechazado { background: var(--danger-bg); color: var(--danger-text); }
  .status-chip.procesando { background: var(--info-bg); color: var(--info-text); }

  .loading-state { text-align: center; padding: 60px 20px; color: var(--kn-blue); font-family: var(--mono); font-size: 14px; }
  .loading-dot { animation: blink 1.2s infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.4s; }
  .loading-dot:nth-child(3) { animation-delay: 0.8s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--kn-navy); margin-bottom: 6px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--kn-navy); color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 500; transition: transform 0.3s ease; z-index: 300; pointer-events: none; white-space: nowrap; border: 2px solid var(--kn-blue); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); border-color: var(--danger); }
  .toast.ok { background: #059669; border-color: #059669; }

  /* Pestañas */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 2px solid var(--border); }
  .tab-btn { padding: 10px 20px; background: none; border: none; font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .tab-btn:hover { color: var(--kn-navy); }
  .tab-btn.active { color: var(--kn-navy); border-bottom-color: var(--kn-blue); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Tabla resumen */
  .resumen-wrap { overflow-x: auto; }
  .resumen-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .resumen-table th { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; padding: 8px 10px; background: var(--surface2); border-bottom: 1px solid var(--border); text-align: right; white-space: nowrap; }
  .resumen-table th:first-child { text-align: left; }
  .resumen-table td { padding: 10px; border-bottom: 1px solid var(--border); text-align: right; font-family: var(--mono); }
  .resumen-table td:first-child { text-align: left; font-family: var(--sans); font-weight: 600; color: var(--kn-navy); }
  .resumen-table tr:last-child td { border-bottom: none; }
  .resumen-table tr:hover td { background: #fafcff; }
  .val-zero { color: var(--border2); font-family: var(--mono); font-size: 12px; }
  .val-pos { color: var(--kn-navy); font-weight: 600; }
  .chip-val { display: inline-block; padding: 3px 8px; border-radius: 6px; font-family: var(--mono); font-size: 12px; font-weight: 600; }
  .th-wrap { position: relative; cursor: default; display: inline-flex; align-items: center; gap: 3px; }
  .th-tooltip { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: var(--kn-navy); color: #fff; font-size: 11px; padding: 5px 10px; border-radius: 6px; white-space: nowrap; z-index: 10; margin-top: 4px; font-weight: 400; letter-spacing: 0; text-transform: none; }
  .th-wrap:hover .th-tooltip { display: block; }
  .resumen-table tfoot td { border-top: 2px solid var(--border2); }
  .semana-nav { display: flex; align-items: center; gap: 0; margin-bottom: 24px; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,51,105,0.08); }
  .semana-label { flex: 1; font-family: var(--mono); font-size: 14px; color: var(--kn-navy); font-weight: 600; text-align: center; padding: 14px 8px; letter-spacing: 0.02em; }
  .btn-semana { width: 52px; height: 52px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--kn-navy); font-size: 18px; transition: all 0.15s; flex-shrink: 0; }
  .btn-semana:hover:not(:disabled) { background: var(--kn-navy); color: #fff; }
  .btn-semana:disabled { color: var(--border2); cursor: not-allowed; }
  .btn-semana:first-child { border-right: 1px solid var(--border); }
  .btn-semana:last-child { border-left: 1px solid var(--border); }

  @media (max-width: 700px) {
    main { padding: 16px 12px 0; }
    .summary-bar { max-width: 100%; }
    .desktop-table { display: none; }
    .mobile-cards { display: block; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo"><span class="logo-dot"></span> KN · Aprobaciones</span>
    <div class="manager-chip">
      <div class="avatar" id="avatarInitials">--</div>
      <span class="mgr-name" id="mgrNameDisplay">Cargando...</span>
    </div>
  </div>
</header>

<main>
  <div class="page-title">Registros pendientes</div>
  <div class="page-subtitle" id="pageSubtitle">Cargando...</div>
  <div class="summary-bar">
    <div class="stat"><div class="stat-label">Pendientes</div><div class="stat-val" id="statTotal">—</div></div>
    <div class="stat"><div class="stat-label">Empleados</div><div class="stat-val" id="statEmpleados">—</div></div>
    <div class="stat"><div class="stat-label">Aprobados</div><div class="stat-val" id="statAprobados">0</div></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pendientes', this)">📋 Pendientes <span id="tabCountPendientes"></span></button>
    <button class="tab-btn" onclick="switchTab('resumen', this)">📊 Resumen semana</button>
  </div>

  <div class="tab-content active" id="tab-pendientes">
    <div id="container">
    <div class="loading-state">Cargando pendientes<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
  </div>
</main>
    </div>
  </div>

  <div class="tab-content" id="tab-resumen">
    <div class="semana-nav">
      <button class="btn-semana" id="btnPrevSemana" onclick="cambiarSemana(-1)" title="Semana anterior">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="semana-label" id="semanaLabel">—</div>
      <button class="btn-semana" id="btnNextSemana" onclick="cambiarSemana(1)" title="Semana siguiente">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div id="resumenContainer">
      <div class="loading-state">Selecciona la pestaña para cargar<span class="loading-dot">.</span></div>
    </div>
  </div>

<div class="toast" id="toast"></div>

<script>
const FLOW_GET = 'https://bd4a763d737defaeacf0e99a4d082f.58.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/3fd25ad09b5449a9a614f784b10bbc72/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=oYx-w7yw0ZHA9-KETPaXHxpMvUHGEI0iUJoElGXsHvQ';
const FLOW_APROBAR = 'https://bd4a763d737defaeacf0e99a4d082f.58.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/cad0dc8e16a4466cb83297306976794d/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=tTGdFfz_6i4mpPo6HmbobfRSPxoGwS9V5fBi0z7L9uA';
const FLOW_RESUMEN = 'https://bd4a763d737defaeacf0e99a4d082f.58.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/294ad9e473794caaa408b8156dcf55a3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=YVuu_MDyDZH8cFKPSysHz9KquwmrblYo2nhGhwNOS_w';

const params = new URLSearchParams(location.search);
const jefeEmail = params.get('jefe') || '';
const nombreParam = params.get('nombre') || '';
let registros = [], aprobadosHoy = 0;
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DIAS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

document.addEventListener('DOMContentLoaded', () => {
  if (!jefeEmail) {
    document.getElementById('container').innerHTML = '<div class="loading-state" style="color:var(--danger)">⚠️ Falta el parámetro ?jefe= en la URL.</div>';
    return;
  }
  initManager();
  loadPendientes();
});

function initManager() {
  const display = nombreParam || jefeEmail.split('@')[0].replace('.', ' ');
  const parts = display.split(' ');
  document.getElementById('avatarInitials').textContent = parts.map(p=>p[0]?.toUpperCase()||'').join('').slice(0,2) || '??';
  document.getElementById('mgrNameDisplay').textContent = display;
}

async function loadPendientes() {
  try {
    const resp = await fetch(FLOW_GET, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({jefeEmail}) });
    const data = await resp.json();
    const raw = data?.registros?.body || data.registros || data || [];
    registros = raw.map(r => ({
      ...r,
      HoraInicio: r.HoraInicio ? r.HoraInicio.substring(11,16) : null,
      HoraFin:    r.HoraFin    ? r.HoraFin.substring(11,16)    : null,
      TipoPago:   r.TipoPago   || 'N/A',
    }));
  } catch(e) { registros = []; }
  renderPendientes();
}

function tipoBadge(tipoDia) {
  if (tipoDia === 'Dominical') return '<span class="badge dominical">Dominical</span>';
  if (tipoDia === 'Sabado')    return '<span class="badge sabado">Sábado</span>';
  return '<span class="badge habil">Hábil</span>';
}
function tipoPagoHtml(tp) {
  return tp && tp !== 'N/A' && tp !== 'Ordinario'
    ? `<span class="badge extra">${tp}</span>`
    : '<span style="color:var(--muted);font-size:12px">—</span>';
}
function fechaStr(r) {
  const d = r.FechaRegistro ? new Date(r.FechaRegistro + 'T12:00:00') : null;
  return d ? `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]}` : '—';
}

function renderPendientes() {
  const container = document.getElementById('container');
  document.getElementById('pageSubtitle').textContent =
    `${registros.length} registro${registros.length !== 1 ? 's' : ''} pendiente${registros.length !== 1 ? 's' : ''} de aprobación`;
  document.getElementById('statTotal').textContent = registros.length;
  document.getElementById('tabCountPendientes').textContent = registros.length > 0 ? `(${registros.length})` : '';

  const porEmpleado = {};
  registros.forEach(r => {
    if (!porEmpleado[r.CorreoEmpleado]) porEmpleado[r.CorreoEmpleado] = { nombre: r.NombreEmpleado || r.CorreoEmpleado.split('@')[0], email: r.CorreoEmpleado, regs: [] };
    porEmpleado[r.CorreoEmpleado].regs.push(r);
  });
  document.getElementById('statEmpleados').textContent = Object.keys(porEmpleado).length;

  if (registros.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">Sin pendientes</div><div class="empty-sub">No hay registros pendientes de aprobación.</div></div>`;
    return;
  }

  container.innerHTML = '';
  Object.values(porEmpleado).forEach(emp => {
    const initials = (emp.nombre || emp.email).split(/[ @]/).map(p=>p[0]?.toUpperCase()||'').join('').slice(0,2);
    const nombreCorto = (emp.nombre || emp.email.split('@')[0]).split('/')[0].trim();
    const block = document.createElement('div');
    block.className = 'empleado-block';

    // Desktop table rows
    const desktopRows = emp.regs.map(r => `
      <tr id="row-${r.ID}">
        <td class="col-fecha"><div style="font-weight:600">${fechaStr(r)}</div><div style="margin-top:3px">${tipoBadge(r.TipoDia)}</div></td>
        <td class="col-horario"><span class="time-val">${r.HoraInicio||'—'}</span> <span style="color:var(--muted)">→</span> <span class="time-val">${r.HoraFin||'—'}</span></td>
        <td class="col-horas"><span class="time-val">${r.HorasOrdinarias ? parseFloat(r.HorasOrdinarias).toFixed(1)+'h' : '—'}</span></td>
        <td class="col-tipo">${tipoPagoHtml(r.TipoPago)}</td>
        <td class="col-extra"><span class="time-val">${r.HorasExtra ? parseFloat(r.HorasExtra).toFixed(1)+'h' : '—'}</span></td>
        <td class="col-obs"><span style="font-size:12px;color:var(--muted);font-style:italic">${r.Observaciones||'—'}</span></td>
        <td class="col-accion"><div class="actions-cell" id="actions-${r.ID}">
          <button class="btn-decision btn-extra"      onclick="procesar(${r.ID},'extra')"><span class="material-icons-round">schedule</span>Hora extra</button>
          <button class="btn-decision btn-recargo"    onclick="procesar(${r.ID},'recargo')"><span class="material-icons-round">nightlight</span>Recargo</button>
          <button class="btn-decision btn-compensado" onclick="procesar(${r.ID},'compensado')"><span class="material-icons-round">event_available</span>Compensado</button>
          <button class="btn-decision btn-rechazar"   onclick="procesar(${r.ID},'rechazado')"><span class="material-icons-round">block</span>Rechazar</button>
        </div></td>
      </tr>`).join('');

    // Mobile cards
    const mobileCards = emp.regs.map(r => `
      <div class="reg-card" id="card-${r.ID}">
        <div class="reg-card-top">
          <div>
            <div class="reg-card-fecha">${fechaStr(r)}</div>
            <div style="margin-top:4px">${tipoBadge(r.TipoDia)}</div>
          </div>
          ${tipoPagoHtml(r.TipoPago)}
        </div>
        <div class="reg-card-meta">
          <div class="icon-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kn-blue)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span class="time-val">${r.HoraInicio||'—'} → ${r.HoraFin||'—'}</span>
          </div>
          <div class="icon-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kn-navy)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span>${r.HorasOrdinarias ? parseFloat(r.HorasOrdinarias).toFixed(1)+'h' : '—'}</span>
          </div>
          <div class="icon-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--warn-text)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span style="color:var(--warn-text)">${r.HorasExtra ? parseFloat(r.HorasExtra).toFixed(1)+'h extra' : 'Sin extra'}</span>
          </div>
        </div>
        ${r.Observaciones ? `<div class="reg-card-obs">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>${r.Observaciones}</span>
        </div>` : ''}
        <div class="reg-card-actions">
          <div id="actions-${r.ID}" style="display:flex;gap:8px;flex-wrap:wrap;width:100%;align-items:center;">
            <button class="btn-decision btn-extra"      onclick="procesar(${r.ID},'extra')"><span class="material-icons-round">schedule</span>Hora extra</button>
            <button class="btn-decision btn-recargo"    onclick="procesar(${r.ID},'recargo')"><span class="material-icons-round">nightlight</span>Recargo</button>
            <button class="btn-decision btn-compensado" onclick="procesar(${r.ID},'compensado')"><span class="material-icons-round">event_available</span>Compensado</button>
            <button class="btn-decision btn-rechazar"   onclick="procesar(${r.ID},'rechazado')"><span class="material-icons-round">block</span>Rechazar</button>

          </div>
        </div>
      </div>`).join('');

    block.innerHTML = `
      <div class="empleado-header">
        <div class="emp-info">
          <div class="emp-avatar">${initials}</div>
          <div><div class="emp-name">${nombreCorto}</div><div class="emp-email">${emp.email}</div></div>
        </div>
        <span class="emp-count" id="count-${emp.email.replace(/[@.]/g,'_')}">${emp.regs.length} pendiente${emp.regs.length!==1?'s':''}</span>
      </div>
      <table class="desktop-table">
        <thead><tr>
          <th class="col-fecha">Fecha</th>
          <th class="col-horario">Horario</th>
          <th class="col-horas">Horas</th>
          <th class="col-tipo">Tipo pago</th>
          <th class="col-extra">Horas extra</th>
          <th class="col-obs">Observaciones</th>
          <th class="col-accion">Acción</th>
        </tr></thead>
        <tbody>${desktopRows}</tbody>
      </table>
      <div class="mobile-cards">${mobileCards}</div>`;

    container.appendChild(block);
  });
}

async function procesar(id, tipoAprobacion) {
  const aprobado = tipoAprobacion === 'rechazado' ? 'no' : 'si';
  const compensado = tipoAprobacion === 'compensado' ? 'si' : 'no';
  const actionsDiv = document.getElementById(`actions-${id}`);
  actionsDiv.querySelectorAll('button').forEach(b => b.disabled = true);
  actionsDiv.innerHTML = '<span class="status-chip procesando">⏳ Procesando...</span>';

  try {
    await fetch(`${FLOW_APROBAR}&registro=${id}&aprobado=${aprobado}&compensado=${compensado}&tipoAprobacion=${tipoAprobacion}`, { method:'GET' });
    const labels = { extra: '✓ Hora extra', recargo: '✓ Recargo', compensado: '✓ Compensado', rechazado: '✗ Rechazado' };
    const chipClass = tipoAprobacion === 'rechazado' ? 'rechazado' : 'aprobado';
    actionsDiv.innerHTML = `<span class="status-chip ${chipClass}">${labels[tipoAprobacion]||'✓ OK'}</span>`;
    aprobadosHoy++;
    document.getElementById('statAprobados').textContent = aprobadosHoy;
    showToast(tipoAprobacion==='rechazado' ? '❌ Registro rechazado' : '✅ Registro aprobado', tipoAprobacion==='rechazado' ? 'error' : 'ok');
    const totalPendientes = document.querySelectorAll('.btn-aprobar:not(:disabled)').length;
    document.getElementById('statTotal').textContent = totalPendientes;
  } catch(e) {
    actionsDiv.innerHTML = `
      <button class="btn-decision btn-extra"      onclick="procesar(${id},'extra')"><span class="material-icons-round">schedule</span>Hora extra</button>
      <button class="btn-decision btn-recargo"    onclick="procesar(${id},'recargo')"><span class="material-icons-round">nightlight</span>Recargo</button>
      <button class="btn-decision btn-compensado" onclick="procesar(${id},'compensado')"><span class="material-icons-round">event_available</span>Compensado</button>
      <button class="btn-decision btn-rechazar"   onclick="procesar(${id},'rechazado')"><span class="material-icons-round">block</span>Rechazar</button>`;
    showToast('Error al procesar. Intenta de nuevo.', 'error');
  }
}

// ── Pestañas ──────────────────────────────────────────────────────────────────
let semanaOffset = 0;
let resumenCargado = false;

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'resumen' && !resumenCargado) {
    renderSemanaNav();
    loadResumen();
    resumenCargado = true;
  }
}

function getSemanaISO(offset) {
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7) + offset * 7);
  return Math.ceil((((monday - new Date(monday.getFullYear(), 0, 1)) / 86400000) + 1) / 7);
}

function getSemanaLabel(offset) {
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7) + offset * 7);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const MESES2 = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  if (offset === 0) return 'Esta semana';
  if (offset === -1) return 'Semana pasada';
  return `${monday.getDate()} ${MESES2[monday.getMonth()]} – ${sunday.getDate()} ${MESES2[sunday.getMonth()]}`;
}

function renderSemanaNav() {
  document.getElementById('semanaLabel').textContent = getSemanaLabel(semanaOffset);
  document.getElementById('btnNextSemana').disabled = semanaOffset >= 0;
}

function cambiarSemana(dir) {
  semanaOffset += dir;
  renderSemanaNav();
  resumenCargado = false;
  loadResumen();
  resumenCargado = true;
}

async function loadResumen() {
  const container = document.getElementById('resumenContainer');
  container.innerHTML = '<div class="loading-state">Cargando resumen<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>';
  const semana = getSemanaISO(semanaOffset);
  try {
    const resp = await fetch(FLOW_RESUMEN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jefeEmail, semanaISO: semana })
    });
    const data = await resp.json();
    const filas = data?.resumen?.body || data.resumen || data || [];
    renderResumen(filas);
  } catch(e) {
    container.innerHTML = '<div class="loading-state" style="color:var(--danger)">Error al cargar el resumen.</div>';
  }
}

function renderResumen(filas) {
  const container = document.getElementById('resumenContainer');
  if (!filas.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Sin datos</div><div>No hay registros de nómina para esta semana.</div></div>';
    return;
  }

  const CODIGOS = [
    { key: 'TotalHoras', label: 'Base', desc: 'Total horas laboradas', color: 'var(--kn-navy)' },
    { key: 'Cod1060', label: 'Rec.Noc', desc: '1060 · Recargo nocturno (35%)', color: '#6366f1' },
    { key: 'Cod1061', label: 'Ext.Diu', desc: '1061 · Extra diurna (125%)', color: '#0099DA' },
    { key: 'Cod1062', label: 'Ext.Noc', desc: '1062 · Extra nocturna (175%)', color: '#7c3aed' },
    { key: 'Cod1063', label: 'Ext.Dom.D', desc: '1063 · Extra dominical diurna (205%)', color: '#d97706' },
    { key: 'Cod1064', label: 'Ext.Dom.N', desc: '1064 · Extra dominical nocturna (255%)', color: '#b45309' },
    { key: 'Cod1065', label: 'Fest.Comp', desc: '1065 · Festivo/Dominical compensado (80%)', color: '#08C792' },
    { key: 'Cod1066', label: 'Rec.Noc.F', desc: '1066 · Recargo nocturno festivo (215%)', color: '#dc2626' },
    { key: 'Cod1067', label: 'Fest.S/C', desc: '1067 · Festivo sin compensatorio (180%)', color: '#9333ea' },
  ];

  function fval(v) { return parseFloat(v) || 0; }
  function cell(v, color) {
    const n = fval(v);
    return n > 0
      ? `<td><span class="chip-val" style="background:${color}20;color:${color}">${n.toFixed(1)}h</span></td>`
      : `<td><span class="val-zero">—</span></td>`;
  }

  const rows = filas.map(f => {
    const nombre = (f.NombreEmpleado || f.CorreoEmpleado || '').split('/')[0].trim();
    const total = CODIGOS.reduce((s, c) => s + fval(f[c.key]), 0);
    const initials = nombre.split(' ').map(p=>p[0]?.toUpperCase()||'').join('').slice(0,2);
    return `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:28px;height:28px;border-radius:50%;background:var(--kn-navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${initials}</div>
          <div>
            <div style="font-weight:600;font-size:13px;color:var(--kn-navy)">${nombre}</div>
            <div style="font-size:11px;color:var(--muted)">${f.CorreoEmpleado||''}</div>
          </div>
        </div>
      </td>
      ${CODIGOS.map(c => cell(f[c.key], c.color)).join('')}
      <td><span style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--kn-navy)">${total.toFixed(1)}h</span></td>
    </tr>`;
  }).join('');

  // Totales generales
  const totales = CODIGOS.map(c => filas.reduce((s,f) => s + fval(f[c.key]), 0));
  const grandTotal = totales.reduce((s,v) => s+v, 0);
  const totalesRow = `<tr style="background:var(--surface2);font-weight:700;">
    <td style="color:var(--kn-navy);font-size:13px;">📊 Total equipo</td>
    ${totales.map((t,i) => t > 0
      ? `<td><span class="chip-val" style="background:${CODIGOS[i].color}20;color:${CODIGOS[i].color}">${t.toFixed(1)}h</span></td>`
      : `<td><span class="val-zero">—</span></td>`
    ).join('')}
    <td><span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--kn-navy)">${grandTotal.toFixed(1)}h</span></td>
  </tr>`;

  const headers = CODIGOS.map(c =>
    `<th><div class="th-wrap" title="${c.desc}">${c.label}<span class="th-tooltip">${c.desc}</span></div></th>`
  ).join('');

  container.innerHTML = `
    <div class="resumen-wrap">
      <table class="resumen-table">
        <thead>
          <tr>
            <th style="text-align:left;min-width:200px;">Empleado</th>
            ${headers}
            <th>Total</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>${totalesRow}</tfoot>
      </table>
    </div>`;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' '+type : '');
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
