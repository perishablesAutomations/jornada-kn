<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aprobaciones — KN Perishables</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      background: #003087;
      color: white;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.95;
    }
    .logo em { font-style: normal; opacity: 0.55; margin: 0 6px; }
    .jefe-chip {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ── WEEK NAV ───────────────────────────────── */
    .week-nav {
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 10px 24px;
      border-bottom: 1px solid #e2e6ea;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .nav-btn {
      background: none;
      border: 1px solid #dde1e7;
      cursor: pointer;
      color: #003087;
      padding: 5px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: all 0.15s;
      line-height: 0;
    }
    .nav-btn:hover:not(:disabled) { background: #e8f0fe; border-color: #003087; }
    .nav-btn:disabled { color: #c4c9d4; border-color: #eee; cursor: default; }
    #weekLabel {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      min-width: 240px;
      text-align: center;
    }
    .week-pendientes-count {
      font-size: 11px;
      font-weight: 700;
      background: #e65100;
      color: white;
      border-radius: 10px;
      padding: 2px 8px;
      letter-spacing: 0.3px;
    }

    /* ── CONTENT ────────────────────────────────── */
    .content { max-width: 1140px; margin: 0 auto; padding: 20px 16px 40px; }

    /* ── EMP CARD ───────────────────────────────── */
    .emp-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 20px;
      overflow: hidden;
      border: 1px solid #e8eaed;
      transition: box-shadow 0.2s;
    }
    .emp-card.has-pending {
      border-left: 4px solid #f57c00;
      box-shadow: 0 2px 10px rgba(245,124,0,0.12);
    }
    .emp-card:not(.has-pending) { opacity: 0.88; }

    .emp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: #fafbfc;
      border-bottom: 1px solid #f0f0f0;
    }
    .emp-nombre {
      font-size: 15px;
      font-weight: 700;
      color: #003087;
    }
    .emp-email {
      font-size: 11px;
      color: #8a93a2;
      display: block;
      margin-top: 2px;
    }
    .emp-badges { display: flex; gap: 6px; align-items: center; }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .badge.pending { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
    .badge.open    { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .badge.done    { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

    /* ── RESUMEN HORAS ──────────────────────────── */
    .resumen-horas {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid #f0f0f0;
    }
    .hora-stat {
      padding: 12px 20px;
      border-right: 1px solid #f0f0f0;
      text-align: center;
    }
    .hora-stat:last-child { border-right: none; }
    .hora-val {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: -0.3px;
    }
    .hora-lbl {
      font-size: 10px;
      font-weight: 600;
      color: #9aa1b0;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-top: 2px;
    }
    .hora-stat.alerta .hora-val { color: #c2410c; }
    .hora-stat.ok     .hora-val { color: #15803d; }

    /* ── BARRA 44H ──────────────────────────────── */
    .barra-wrap { padding: 10px 20px 0; }
    .barra-track {
      height: 8px;
      background: #edf0f4;
      border-radius: 4px;
      overflow: hidden;
    }
    .barra-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .barra-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #9aa1b0;
      padding: 4px 0 8px;
    }
    .barra-meta strong { color: #1a1a2e; }

    /* ── TABLA REGISTROS ────────────────────────── */
    .tabla-wrap { overflow-x: auto; }
    .registros-tabla {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }
    .registros-tabla th {
      background: #f7f8fa;
      color: #6b7280;
      font-weight: 600;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #e8eaed;
      white-space: nowrap;
    }
    .registros-tabla td {
      padding: 8px 12px;
      border-bottom: 1px solid #f5f6f8;
      vertical-align: middle;
    }
    .registros-tabla tr:last-child td { border-bottom: none; }

    .fila-pending td   { background: #fffbf2; }
    .fila-abierta td   { background: #f0fdf4; }
    .fila-anomala td   { background: #fff0f0; }

    /* tipo dia chips */
    .chip-dia {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .chip-habil      { background: #dbeafe; color: #1d4ed8; }
    .chip-sabado     { background: #ede9fe; color: #6d28d9; }
    .chip-dominical  { background: #fce7f3; color: #be185d; }
    .chip-festivo    { background: #ffedd5; color: #c2410c; }
    .chip-desconocido{ background: #f3f4f6; color: #6b7280; }

    /* ── DECISION BUTTONS ───────────────────────── */
    .decision-btns {
      display: flex;
      gap: 4px;
      align-items: center;
      white-space: nowrap;
    }
    .dec-btn {
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      padding: 4px 9px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      background: #f9fafb;
      color: #6b7280;
      transition: all 0.12s;
      white-space: nowrap;
      line-height: 1;
    }
    .dec-btn .material-icons { font-size: 13px; }
    .dec-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.12); }

    .dec-btn.extra:hover,      .dec-btn.extra.selected      { background: #1d4ed8; color: white; border-color: #1d4ed8; }
    .dec-btn.recargo:hover,    .dec-btn.recargo.selected    { background: #d97706; color: white; border-color: #d97706; }
    .dec-btn.compensado:hover, .dec-btn.compensado.selected { background: #16a34a; color: white; border-color: #16a34a; }
    .dec-btn.rechazar:hover,   .dec-btn.rechazar.selected   { background: #dc2626; color: white; border-color: #dc2626; }

    .decision-aprobada { font-size: 11.5px; color: #6b7280; }
    .anomaly-txt { color: #dc2626; }

    /* ── CARD FOOTER ────────────────────────────── */
    .card-footer {
      padding: 12px 20px;
      border-top: 1px solid #f0f0f0;
      background: #fafbfc;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .btn-guardar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: #003087;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-guardar:hover:not(:disabled) { background: #002166; }
    .btn-guardar:disabled { opacity: 0.5; cursor: default; }
    .btn-guardar .material-icons { font-size: 16px; }
    .save-hint {
      font-size: 12px;
      color: #9aa1b0;
      transition: color 0.2s;
    }
    .save-hint.ready { color: #16a34a; font-weight: 600; }

    /* ── LOADING ────────────────────────────────── */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(240,242,245,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }
    #loading.visible { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3.5px solid #d1d5db;
      border-top-color: #003087;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-label { font-size: 13px; color: #6b7280; }

    /* ── ERROR ──────────────────────────────────── */
    #error-box {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    /* ── EMPTY ──────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: #9aa1b0;
      font-size: 14px;
    }
    .empty .material-icons { font-size: 48px; display: block; margin-bottom: 12px; color: #d1d5db; }

    /* ── TOAST ──────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #1a1a2e;
      color: white;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 300;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 700px) {
      .resumen-horas { grid-template-columns: repeat(2, 1fr); }
      .dec-btn span:not(.material-icons) { display: none; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span class="loading-label">Cargando registros del equipo...</span>
</div>

<div id="toast"></div>

<header>
  <span class="logo">KN <em>·</em> Aprobaciones</span>
  <span class="jefe-chip" id="jefeChip">—</span>
</header>

<div class="week-nav">
  <button class="nav-btn" id="prevWeek" disabled>
    <span class="material-icons">chevron_left</span>
  </button>
  <span id="weekLabel">—</span>
  <span class="week-pendientes-count" id="weekPendCount" style="display:none"></span>
  <button class="nav-btn" id="nextWeek" disabled>
    <span class="material-icons">chevron_right</span>
  </button>
</div>

<div class="content">
  <div id="error-box"></div>
  <div id="empList"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// CONSTANTES — ajusta FLOW_APROBACION con la URL real de Flow 5
// ══════════════════════════════════════════════════════════════════
const FLOW_EQUIPO = 'https://bd4a763d737defaeacf0e99a4d082f.58.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6dc19841dab7420aa93bd860ba461b94/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=f5T0mGD6vBp2h5qddS9LSx2pLVR_UCJb3vNSfQSyzfU';

const FLOW_APROBACION = 'https://bd4a763d737defaeacf0e99a4d082f.58.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/cad0dc8e16a4466cb83297306976794d/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=tTGdFfz_6i4mpPo6HmbobfRSPxoGwS9V5fBi0z7L9uA';

// Mapeo de decisión UI → valor tipoAprobacion que espera Flow 5
const DECISIONES = {
  HoraExtra:  'extra',
  Recargo:    'recargo',
  Compensado: 'compensado',
  Rechazar:   'rechazado'
};

// ══════════════════════════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════════════════════════
let todosRegistros = [];
let semanas        = [];       // ['2026-06-22', '2026-06-15', ...]  newest first
let semanaIdx      = 0;        // índice en `semanas` de la semana visible
let decisions      = {};       // { [recordId]: 'HoraExtra'|'Recargo'|'Compensado'|'Rechazar' }
let emailJefe      = '';

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
async function init() {
  const params = new URLSearchParams(window.location.search);
  emailJefe = (params.get('email') || '').trim();

  if (!emailJefe) {
    showError('Falta parámetro email en la URL. Ejemplo: ?email=tu.nombre@kuehne-nagel.com');
    return;
  }

  const alias = emailJefe.split('@')[0].replace(/\./g, ' ');
  document.getElementById('jefeChip').textContent = alias;
  await cargarRegistros();
}

// ══════════════════════════════════════════════════════════════════
// CARGA DE DATOS
// ══════════════════════════════════════════════════════════════════
async function cargarRegistros() {
  showLoading(true);
  hideError();
  try {
    const res = await fetch(FLOW_EQUIPO, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: emailJefe })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
    const data = await res.json();

    // Filtrar registros sin empleado (registros de prueba/viejos)
    todosRegistros = (data.registros || []).filter(r => r.Empleado && r.Empleado.includes('@'));
    decisions = {};
    procesarSemanas();
    renderSemana();
  } catch (err) {
    showError('Error cargando registros: ' + err.message);
  } finally {
    showLoading(false);
  }
}

// ══════════════════════════════════════════════════════════════════
// SEMANAS (lunes–domingo, hora local Colombia UTC-5)
// ══════════════════════════════════════════════════════════════════
function toLocalDate(isoStr) {
  // Los timestamps están guardados como hora local Colombia con notación UTC
  // No se aplica offset — se usan métodos getUTC* para leer la hora "local" almacenada
  return new Date(isoStr);
}

function getWeekStart(isoStr) {
  // Usar UTC* directamente — las fechas almacenadas son hora local Colombia
  const d   = new Date(isoStr);
  const dow  = d.getUTCDay();                  // 0=Dom, 1=Lun
  const diff = dow === 0 ? -6 : 1 - dow;      // días hasta el lunes
  const monday = new Date(d);
  monday.setUTCDate(d.getUTCDate() + diff);
  return monday.toISOString().split('T')[0];   // 'YYYY-MM-DD'
}

function procesarSemanas() {
  const set = new Set(todosRegistros.map(r => getWeekStart(r.HoraInicio)));
  semanas = Array.from(set).sort().reverse();  // más reciente primero

  // Posicionar en la semana actual o la más reciente
  const hoyStr = getWeekStart(new Date().toISOString());
  const idx = semanas.indexOf(hoyStr);
  semanaIdx = idx >= 0 ? idx : 0;
}

function registrosDeSemana(weekStart) {
  return todosRegistros.filter(r => getWeekStart(r.HoraInicio) === weekStart);
}

function formatWeekLabel(weekStart) {
  const lunes   = new Date(weekStart + 'T12:00:00Z');
  const domingo = new Date(lunes);
  domingo.setUTCDate(lunes.getUTCDate() + 6);
  const fmtDate = d => d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short', timeZone: 'UTC' });
  return `${fmtDate(lunes)} – ${fmtDate(domingo)} · ${lunes.getUTCFullYear()}`;
}

// ══════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════
function getVal(field) {
  if (field === null || field === undefined) return null;
  if (typeof field === 'string') return field.trim() || null;
  if (typeof field === 'object' && field.Value !== undefined) return field.Value;
  return null;
}

function formatHora(isoStr) {
  if (!isoStr) return '—';
  const local = toLocalDate(isoStr);
  const h = String(local.getUTCHours()).padStart(2, '0');
  const m = String(local.getUTCMinutes()).padStart(2, '0');
  return `${h}:${m}`;
}

function formatFecha(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr);
  const dias  = ['dom','lun','mar','mié','jue','vie','sáb'];
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${dias[d.getUTCDay()]}, ${d.getUTCDate()} ${meses[d.getUTCMonth()]}`;
}

function formatNombre(nombreCompleto) {
  if (!nombreCompleto) return '—';
  return nombreCompleto.split('/')[0].trim();
}

function fmtH(val) {
  const n = parseFloat(val) || 0;
  return n.toFixed(1) + 'h';
}

function chipTipoDia(tipoDia) {
  const v = getVal(tipoDia);
  if (!v) return '<span class="chip-dia chip-desconocido">Sin tipo</span>';
  const m = {
    'Habil': 'chip-habil',
    'Sabado': 'chip-sabado',
    'Dominical': 'chip-dominical',
    'Festivo': 'chip-festivo'
  };
  const cls = m[v] || 'chip-desconocido';
  return `<span class="chip-dia ${cls}">${v}</span>`;
}

function safeId(email) {
  // genera un ID CSS-seguro a partir del email
  return 'emp-' + email.replace(/[@.]/g, '_');
}

// ══════════════════════════════════════════════════════════════════
// RENDER SEMANA
// ══════════════════════════════════════════════════════════════════
function renderSemana() {
  const container = document.getElementById('empList');

  if (semanas.length === 0) {
    document.getElementById('weekLabel').textContent = 'Sin registros';
    container.innerHTML = `<div class="empty">
      <span class="material-icons">inbox</span>
      No hay registros para este equipo.
    </div>`;
    return;
  }

  const weekStart = semanas[semanaIdx];
  document.getElementById('weekLabel').textContent = formatWeekLabel(weekStart);
  document.getElementById('prevWeek').disabled = semanaIdx >= semanas.length - 1;
  document.getElementById('nextWeek').disabled = semanaIdx <= 0;

  const regs = registrosDeSemana(weekStart);

  // Agrupar por empleado
  const empMap = {};
  regs.forEach(r => {
    const key = r.Empleado.toLowerCase(); // normalizar email
    if (!empMap[key]) empMap[key] = { email: r.Empleado, nombre: r.NombreEmpleado, regs: [] };
    empMap[key].regs.push(r);
  });

  // Ordenar: pendientes primero, luego por nombre
  const empKeys = Object.keys(empMap).sort((a, b) => {
    const ap = empMap[a].regs.some(r => r.RequiereAprobacion) ? 1 : 0;
    const bp = empMap[b].regs.some(r => r.RequiereAprobacion) ? 1 : 0;
    if (bp !== ap) return bp - ap;
    return formatNombre(empMap[a].nombre).localeCompare(formatNombre(empMap[b].nombre));
  });

  // Total pendientes de la semana
  const totalPend = empKeys.reduce((s, k) => s + empMap[k].regs.filter(r => r.RequiereAprobacion).length, 0);
  const countEl = document.getElementById('weekPendCount');
  if (totalPend > 0) {
    countEl.style.display = '';
    countEl.textContent = `${totalPend} pendiente${totalPend !== 1 ? 's' : ''}`;
  } else {
    countEl.style.display = 'none';
  }

  container.innerHTML = '';
  if (empKeys.length === 0) {
    container.innerHTML = `<div class="empty">
      <span class="material-icons">event_busy</span>
      No hay registros para esta semana.
    </div>`;
    return;
  }

  empKeys.forEach(key => {
    const { email, nombre, regs: empRegs } = empMap[key];
    container.appendChild(buildEmpCard(email, nombre, empRegs));
  });
}

// ══════════════════════════════════════════════════════════════════
// CARD EMPLEADO
// ══════════════════════════════════════════════════════════════════
function buildEmpCard(email, nombre, registros) {
  const sorted = [...registros].sort((a, b) => new Date(a.HoraInicio) - new Date(b.HoraInicio));

  const cerrados   = sorted.filter(r => getVal(r.Estado) === 'Cerrado');
  const horasOrd   = cerrados.reduce((s, r) => s + (parseFloat(r.HorasOrdinarias) || 0), 0);
  const horasExtra = cerrados.reduce((s, r) => s + (parseFloat(r.HorasExtra)      || 0), 0);
  const horasBrut  = cerrados.reduce((s, r) => s + (parseFloat(r.HorasBrutas)     || 0), 0);
  const pendientes = sorted.filter(r => r.RequiereAprobacion);
  const hayAbierto = sorted.some(r => getVal(r.Estado) === 'Abierto');
  const restante44 = Math.max(44 - horasOrd, 0);
  const pct44      = Math.min((horasOrd / 44) * 100, 100);
  const barColor   = pct44 >= 100 ? '#dc2626' : pct44 >= 88 ? '#d97706' : '#2563eb';
  const hasPend    = pendientes.length > 0;
  const empSafeId  = safeId(email);

  const card = document.createElement('div');
  card.className = 'emp-card' + (hasPend ? ' has-pending' : '');
  card.id = empSafeId;

  card.innerHTML = `
    <div class="emp-header">
      <div>
        <span class="emp-nombre">${formatNombre(nombre)}</span>
        <span class="emp-email">${email}</span>
      </div>
      <div class="emp-badges">
        ${hasPend
          ? `<span class="badge pending">${pendientes.length} pendiente${pendientes.length !== 1 ? 's' : ''}</span>`
          : '<span class="badge done">✓ Al día</span>'}
        ${hayAbierto ? '<span class="badge open">Turno abierto</span>' : ''}
      </div>
    </div>

    <div class="resumen-horas">
      <div class="hora-stat">
        <span class="hora-val">${fmtH(horasBrut)}</span>
        <span class="hora-lbl">Horas brutas</span>
      </div>
      <div class="hora-stat ${horasOrd >= 44 ? 'ok' : ''}">
        <span class="hora-val">${fmtH(horasOrd)}</span>
        <span class="hora-lbl">Ordinarias</span>
      </div>
      <div class="hora-stat ${horasExtra > 0 ? 'alerta' : ''}">
        <span class="hora-val">${fmtH(horasExtra)}</span>
        <span class="hora-lbl">Extralaborales</span>
      </div>
      <div class="hora-stat ${restante44 === 0 ? 'ok' : 'alerta'}">
        <span class="hora-val">${restante44 === 0 ? '—' : fmtH(restante44)}</span>
        <span class="hora-lbl">${restante44 === 0 ? 'Tope 44h ✓' : 'Faltan p/44h'}</span>
      </div>
    </div>

    <div class="barra-wrap">
      <div class="barra-track">
        <div class="barra-fill" style="width:${pct44}%;background:${barColor}"></div>
      </div>
      <div class="barra-meta">
        <span>${fmtH(horasOrd)} <strong>ordinarias</strong> de 44h semanales</span>
        <span>${Math.round(pct44)}%</span>
      </div>
    </div>

    <div class="tabla-wrap">
      <table class="registros-tabla">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Entrada</th>
            <th>Salida</th>
            <th>Brutas</th>
            <th>Ord.</th>
            <th>Extra</th>
            <th>Tipo día</th>
            <th>Franja</th>
            <th>Observaciones</th>
            <th>Estado / Decisión</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map(r => buildFila(r)).join('')}
        </tbody>
      </table>
    </div>

    ${hasPend ? `
      <div class="card-footer">
        <button class="btn-guardar" data-email="${email}" data-nombre="${formatNombre(nombre)}" disabled>
          <span class="material-icons">save</span>
          Guardar decisiones
        </button>
        <span class="save-hint" id="hint-${empSafeId}">
          Define ${pendientes.length} decisión${pendientes.length !== 1 ? 'es' : ''} para guardar
        </span>
      </div>
    ` : ''}
  `;

  // Listener en botón guardar
  const btn = card.querySelector('.btn-guardar');
  if (btn) {
    btn.addEventListener('click', () => {
      guardarDecisiones(email, formatNombre(nombre), pendientes);
    });
  }

  return card;
}

// ══════════════════════════════════════════════════════════════════
// FILA DE REGISTRO
// ══════════════════════════════════════════════════════════════════
function buildFila(r) {
  const estado   = getVal(r.Estado);
  const tipoPago = getVal(r.TipoPago);
  const franja   = getVal(r.FranjaInicio);
  const obs      = (r.Observaciones || '').trim();

  const isAbierto = estado === 'Abierto';
  const isPending = r.RequiereAprobacion;
  const isAnomalo = (parseFloat(r.HorasBrutas) || 0) > 24;

  let rowClass = '';
  if (isAnomalo)  rowClass = 'fila-anomala';
  else if (isPending)  rowClass = 'fila-pending';
  else if (isAbierto)  rowClass = 'fila-abierta';

  const dec = decisions[r.ID];

  let decisionCell;
  if (isAbierto) {
    decisionCell = `<td><em style="color:#16a34a;font-size:11px">En curso</em></td>`;
  } else if (isPending) {
    decisionCell = `
      <td>
        <div class="decision-btns" data-id="${r.ID}">
          <button class="dec-btn extra      ${dec === 'HoraExtra'  ? 'selected' : ''}" data-id="${r.ID}" data-dec="HoraExtra"  title="Hora extra">
            <span class="material-icons">trending_up</span><span>Extra</span>
          </button>
          <button class="dec-btn recargo    ${dec === 'Recargo'    ? 'selected' : ''}" data-id="${r.ID}" data-dec="Recargo"    title="Recargo">
            <span class="material-icons">attach_money</span><span>Recargo</span>
          </button>
          <button class="dec-btn compensado ${dec === 'Compensado' ? 'selected' : ''}" data-id="${r.ID}" data-dec="Compensado" title="Compensado">
            <span class="material-icons">event_available</span><span>Comp.</span>
          </button>
          <button class="dec-btn rechazar   ${dec === 'Rechazar'   ? 'selected' : ''}" data-id="${r.ID}" data-dec="Rechazar"   title="Rechazar">
            <span class="material-icons">close</span><span>Rechazar</span>
          </button>
        </div>
      </td>`;
  } else {
    decisionCell = `
      <td class="decision-aprobada">
        ${tipoPago || '—'}
        ${isAnomalo ? ' <span class="material-icons anomaly-icon" style="font-size:13px;color:#d97706;vertical-align:middle" title="HorasBrutas anómalas (posible error de registro)">warning</span>' : ''}
      </td>`;
  }

  const horasBrut = parseFloat(r.HorasBrutas) || 0;

  return `
    <tr class="${rowClass}">
      <td style="white-space:nowrap">${formatFecha(r.HoraInicio)}</td>
      <td style="font-variant-numeric:tabular-nums">${formatHora(r.HoraInicio)}</td>
      <td style="font-variant-numeric:tabular-nums">${isAbierto ? '—' : formatHora(r.HoraFin)}</td>
      <td class="${isAnomalo ? 'anomaly-txt' : ''}">${isAnomalo ? '⚠️ ' : ''}${fmtH(horasBrut)}</td>
      <td>${fmtH(r.HorasOrdinarias)}</td>
      <td>${fmtH(r.HorasExtra)}</td>
      <td>${chipTipoDia(r.TipoDia)}</td>
      <td style="font-size:11px;color:#6b7280">${franja ? franja.split('(')[0].trim() : '—'}</td>
      <td style="font-size:11px;color:#6b7280;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${obs}">${obs || '—'}</td>
      ${decisionCell}
    </tr>`;
}

// ══════════════════════════════════════════════════════════════════
// EVENTO: CLICK EN BOTÓN DE DECISIÓN
// ══════════════════════════════════════════════════════════════════
document.addEventListener('click', e => {
  const btn = e.target.closest('.dec-btn[data-dec]');
  if (!btn) return;

  const id  = parseInt(btn.dataset.id);
  const dec = btn.dataset.dec;

  decisions[id] = dec;

  // Actualizar visual del grupo de botones
  const group = document.querySelector(`.decision-btns[data-id="${id}"]`);
  if (group) {
    group.querySelectorAll('.dec-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  // Actualizar hint y estado del botón guardar del card
  const card = btn.closest('.emp-card');
  if (!card) return;

  const emailCard  = card.querySelector('.btn-guardar')?.dataset.email;
  if (!emailCard) return;

  const weekStart  = semanas[semanaIdx];
  const regs       = registrosDeSemana(weekStart);
  const pendientes = regs.filter(r => r.Empleado.toLowerCase() === emailCard.toLowerCase() && r.RequiereAprobacion);
  const sinDec     = pendientes.filter(r => !decisions[r.ID]).length;

  const hint    = document.getElementById('hint-' + safeId(emailCard));
  const guardar = card.querySelector('.btn-guardar');

  if (hint) {
    if (sinDec === 0) {
      hint.textContent = '✓ Listo para guardar';
      hint.className = 'save-hint ready';
    } else {
      hint.textContent = `Faltan ${sinDec} decisión${sinDec !== 1 ? 'es' : ''}`;
      hint.className = 'save-hint';
    }
  }
  if (guardar) guardar.disabled = sinDec > 0;
});

// ══════════════════════════════════════════════════════════════════
// GUARDAR DECISIONES
// ══════════════════════════════════════════════════════════════════
async function guardarDecisiones(email, nombreCorto, pendientes) {
  const sinDec = pendientes.filter(r => !decisions[r.ID]);
  if (sinDec.length > 0) {
    showToast(`Faltan ${sinDec.length} decisión${sinDec.length !== 1 ? 'es' : ''} por definir`);
    return;
  }

  const card    = document.getElementById(safeId(email));
  const btn     = card ? card.querySelector('.btn-guardar') : null;
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="material-icons">hourglass_empty</span> Guardando...'; }

  try {
    // Flow 5 (KN-Procesar Aprobación) — un call por registro pendiente
    await Promise.all(pendientes.map(r =>
      fetch(FLOW_APROBACION, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          registro:       String(r.ID),
          tipoAprobacion: DECISIONES[decisions[r.ID]],
          aprobado:       decisions[r.ID] === 'Rechazar' ? 'no' : 'si'
        })
      })
    ));

    // Limpiar decisiones de estos registros
    pendientes.forEach(r => delete decisions[r.ID]);

    showToast(`Decisiones de ${nombreCorto} enviadas`);
    // Recargar datos después de que Flow 5 procese
    setTimeout(() => cargarRegistros(), 2000);
  } catch (err) {
    showToast('Error al guardar: ' + err.message);
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-icons">save</span> Guardar decisiones';
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// NAVEGACIÓN SEMANAS
// ══════════════════════════════════════════════════════════════════
document.getElementById('prevWeek').addEventListener('click', () => {
  if (semanaIdx < semanas.length - 1) { semanaIdx++; renderSemana(); }
});
document.getElementById('nextWeek').addEventListener('click', () => {
  if (semanaIdx > 0) { semanaIdx--; renderSemana(); }
});

// ══════════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════════
function showLoading(v) {
  document.getElementById('loading').classList.toggle('visible', v);
}
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-box').style.display = 'none';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ══════════════════════════════════════════════════════════════════
init();
</script>

</html>
