<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Jornada</title>
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    const accion = params.get('accion');
    const flowUrl = 'FLOW2_URL';

    if (email && accion) {
      fetch(`${flowUrl}&email=${encodeURIComponent(email)}&accion=${accion}`)
        .then(() => {
          document.body.innerHTML = accion === 'checkin'
            ? '<h2>✅ Check In registrado correctamente</h2>'
            : '<h2>🔴 Check Out registrado correctamente</h2>';
        })
        .catch(() => {
          document.body.innerHTML = '<h2>❌ Error al registrar. Intenta de nuevo.</h2>';
        });
    }
  </script>
  <p>Procesando tu solicitud...</p>
</body>
</html>
